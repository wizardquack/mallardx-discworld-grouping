id = "net.mallard.discworld-grouping"
name = "Discworld Grouping"
version = "0.2.1"
description = "A grouping panel showing group roster with HP/GP/shielding info."
language = "lua"
entry = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.8.0"
authors = ["Wizard Quack"]
license = "MIT"

[permissions]
sends = true   # refresh button sends `gs` to the world
# No `gmcp_access` — self-identity comes from discworld-vitals, which
# mirrors `char.info` into the world var namespace (`char.info.<key>`)
# and emits `net.mallard.discworld.char_info` on every frame.

[worlds]
match = ["discworld.starturtle.net:*"]

[panels.group]
title              = "Group"
entry              = "ui/group.html"
default_dock       = "right"
default_size       = { width = 240, height = 320 }
