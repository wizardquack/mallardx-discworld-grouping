<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Discworld Grouping</title>
  <link rel="stylesheet" href="group.css">
  <script src="group.js" defer></script>
</head>
<body>
  <header class="header">
    <span class="title" id="title">Group</span>
    <span class="spacer"></span>
    <button class="refresh refresh-shields" id="refresh-shields" type="button"
            aria-label="Refresh shields" title="Refresh shields (group shields)">
      <svg class="refresh-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 2.2 4.2 4.8v6.4c0 4.8 3.3 8.7 7.8 10.6 4.5-1.9 7.8-5.8 7.8-10.6V4.8L12 2.2z"
              fill="currentColor" fill-opacity="0.18"
              stroke="currentColor" stroke-width="1.6"
              stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="refresh" id="refresh" type="button"
            aria-label="Refresh group status" title="Refresh group status">
      <svg class="refresh-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M12 20.4 4.6 13.1a4.7 4.7 0 0 1 0-6.6 4.6 4.6 0 0 1 6.5 0L12 7.4l0.9-0.9a4.6 4.6 0 0 1 6.5 0 4.7 4.7 0 0 1 0 6.6L12 20.4z"
              fill="currentColor" fill-opacity="0.18"
              stroke="currentColor" stroke-width="1.6"
              stroke-linejoin="round"/>
      </svg>
    </button>
  </header>
  <main class="body" id="body">
    <p class="empty" id="empty">Not in a group.</p>
    <ul class="roster" id="roster"></ul>
  </main>
</body>
</html>
